{% extends "base.html" %}

{% block content %}

<div class="card" style="
    text-align:center; 
    padding:40px 30px; 
    background: linear-gradient(135deg, #fef3c7, #fefce8);
    border-radius:20px; 
    box-shadow:0 6px 18px rgba(0,0,0,0.12);
    max-width:700px; 
    margin:auto;
">

    <h2 style="color:#b45309; font-size:2em; font-weight:700; margin-bottom:15px;">
        Predicted Market Price
    </h2>

    <p class="price" style="
        font-size:3em; 
        font-weight:bold; 
        color:#065f46; 
        margin-bottom:30px;
    ">
        ₦ {{price}}
    </p>

    <div style="
        margin-top:20px; 
        text-align:left; 
        display:inline-block; 
        background-color:#fefce8; 
        padding:25px 30px; 
        border-radius:15px;
        box-shadow:0 3px 10px rgba(0,0,0,0.05);
        min-width:300px;
    ">
        <p style="font-size:1.1em; margin-bottom:8px;"><strong>Vendor Type:</strong> {{vendor}}</p>
        <p style="font-size:1.1em; margin-bottom:8px;"><strong>Store:</strong> {{store}}</p>
        <p style="font-size:1.1em; margin-bottom:8px;"><strong>Food Category:</strong> {{food_cat}}</p>
        <p style="font-size:1.1em; margin-bottom:8px;"><strong>Food Item:</strong> {{food_item}}</p>
        <p style="font-size:1.1em; margin-bottom:8px;"><strong>Item Type:</strong> {{item_type}}</p>
        <p style="font-size:1.1em; margin-bottom:8px;"><strong>Package:</strong> {{category}}</p>
        <p style="font-size:1.1em; margin-bottom:0;"><strong>Date:</strong> {{date}}</p>
    </div>

    <br><br>
    <a href="/predict">
        <button style="
            padding:14px 28px; 
            background-color:#10b981; 
            color:#ffffff; 
            border:none; 
            border-radius:12px; 
            font-size:1.15em; 
            font-weight:700;
            cursor:pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        " 
        onmouseover="this.style.transform='translateY(-3px)'; this.style.boxShadow='0 6px 12px rgba(0,0,0,0.25)';"
        onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='0 0 0 rgba(0,0,0,0)';">
            Predict Another Item
        </button>
    </a>

</div>

{% endblock %}
